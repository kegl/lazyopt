# Grids for hyperparameters not declared inline.
# Namespace must match the source filename stem.

lgbm_classifier:
  n_estimators:
    dtype: int
    default: 100
    values: [50, 100, 200, 300, 500]
  num_leaves:
    dtype: int
    default: 31
    values: [15, 20, 31, 40, 50, 63]
  min_child_samples:
    dtype: int
    default: 20
    values: [5, 10, 20, 30, 50]
